name: Package Manager Support Checks

on:
  push:
    branches: [main]
    paths:
      - 'packaging/homebrew/Casks/iina-plugin-bookmarks.rb'
      - 'packaging/homebrew/**/*.md'
      - '.github/RELEASE_RUNBOOK.md'
      - '.github/workflows/package-manager-support.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packaging/homebrew/Casks/iina-plugin-bookmarks.rb'
      - 'packaging/homebrew/**/*.md'
      - '.github/RELEASE_RUNBOOK.md'
      - '.github/workflows/package-manager-support.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validate Homebrew cask syntax
        run: ruby -c packaging/homebrew/Casks/iina-plugin-bookmarks.rb
      - name: Check package-manager docs formatting
        run: pnpm exec prettier --check '.github/RELEASE_RUNBOOK.md' 'packaging/homebrew/**/*.md'
      - name: Ensure runbook package-manager sync section
        run: grep -Eq '^## [0-9]+\) .*Package-Manager Sync' .github/RELEASE_RUNBOOK.md
